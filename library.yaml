default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.claude/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/

library:
  skills: []
  agents:
    - name: librarian
      description: Helps build, review, and maintain reusable skill and prompt definitions in your personal AI library
      source: https://github.com/briananderson1222/my-ai-library/blob/main/agents/librarian.md
  prompts: []
